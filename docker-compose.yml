services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 18
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18.3-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
      POSTGRES_EXTRA_DATABASES: games,wallets
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # RabbitMQ (with management UI)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Keycloak (Identity Provider)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: "http://localhost:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/9000'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Kong (API Gateway — DB-less / declarative)
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.9.1
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./docker/kong:/kong:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Games Service
  # ---------------------------------------------------------------------------
  games:
    build:
      context: .
      dockerfile: ./services/games/Dockerfile
    ports:
      - "4001:4001"
    environment:
      PORT: "4001"
      DATABASE_URL: "postgresql://admin:admin@postgres:5432/games"
      RABBITMQ_URL: "amqp://admin:admin@rabbitmq:5672"
      GAMES_ENGINE_ENABLED: "true"
      GAMES_ENGINE_TICK_INTERVAL_MS: "500"
      GAMES_BETTING_WINDOW_MS: "10000"
      GAMES_SETTLEMENT_DELAY_MS: "2000"
      CORS_ORIGIN: "http://localhost:3000"
      KEYCLOAK_ISSUER_URL: "http://localhost:8080/realms/crash-game"
      KEYCLOAK_JWKS_URL: "http://keycloak:8080/realms/crash-game/protocol/openid-connect/certs"
      KEYCLOAK_AUDIENCE: "crash-game-client"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"const response = await fetch('http://localhost:4001/health'); process.exit(response.ok ? 0 : 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Wallets Service
  # ---------------------------------------------------------------------------
  wallets:
    build:
      context: .
      dockerfile: ./services/wallets/Dockerfile
    ports:
      - "4002:4002"
    environment:
      PORT: "4002"
      DATABASE_URL: "postgresql://admin:admin@postgres:5432/wallets"
      RABBITMQ_URL: "amqp://admin:admin@rabbitmq:5672"
      CORS_ORIGIN: "http://localhost:3000"
      KEYCLOAK_ISSUER_URL: "http://localhost:8080/realms/crash-game"
      KEYCLOAK_JWKS_URL: "http://keycloak:8080/realms/crash-game/protocol/openid-connect/certs"
      KEYCLOAK_AUDIENCE: "crash-game-client"
      WALLETS_DEMO_INITIAL_CREDIT_ENABLED: "true"
      WALLETS_DEMO_INITIAL_BALANCE_CENTS: "100000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"const response = await fetch('http://localhost:4002/health'); process.exit(response.ok ? 0 : 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "local-development-secret-change-me"
      KEYCLOAK_ISSUER: "http://localhost:8080/realms/crash-game"
      KEYCLOAK_INTERNAL_ISSUER: "http://keycloak:8080/realms/crash-game"
      KEYCLOAK_CLIENT_ID: "crash-game-client"
      KEYCLOAK_CLIENT_SECRET: ""
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
      NEXT_PUBLIC_WS_BASE_URL: "http://localhost:8000"
      NEXT_PUBLIC_BETTING_WINDOW_MS: "10000"
      NEXT_PUBLIC_DEMO_WALLET_CREDIT_ENABLED: "true"
    depends_on:
      kong:
        condition: service_healthy
      games:
        condition: service_healthy
      wallets:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
